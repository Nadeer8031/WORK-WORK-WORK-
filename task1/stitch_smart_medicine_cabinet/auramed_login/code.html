<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

                      "on-primary-fixed-variant": "#683845",

                      "surface-container-highest": "#ebe0e1",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .ambient-shadow {
            box-shadow: 0 20px 40px -10px rgba(53, 14, 27, 0.04);
        }
        .login-card {
            background-color: #ffffff;
            border: 1px solid #DFDCD4;
            transition: box-shadow 250ms ease-in-out;
        }
        .login-card:hover {
            box-shadow: 0 20px 40px -5px rgba(53, 14, 27, 0.06);
        }
        .custom-input:focus {
            outline: none;
            border-bottom-color: #340D1A;
            box-shadow: none;
        }
        .transition-slow {
            transition: all 250ms cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-surface font-body-md text-on-surface min-h-screen flex flex-col relative overflow-hidden">
<!-- Atmospheric WebGL-like Shader Background (Optional Enhancement) -->
<div class="absolute inset-0 z-0 opacity-40 pointer-events-none">
<div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_-20%,_var(--tw-gradient-from),_transparent_60%)] from-primary-fixed-dim/20"></div>
</div>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center relative z-10 px-margin-mobile md:px-margin-desktop py-12">
<div class="w-full max-w-[440px] flex flex-col items-center">
<!-- Brand Anchor -->
<div class="mb-12 text-center">
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary tracking-tight mb-2">AuraMed</h1>
<p class="font-body-md text-secondary max-w-[300px] mx-auto">Precision medical care through reliable sophistication.</p>
</div>
<!-- Login Card -->
<div class="login-card w-full rounded-lg p-8 md:p-10 ambient-shadow">
<h2 class="font-headline-md text-headline-md text-on-surface mb-8">Sign In</h2>
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div class="space-y-1">
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline px-1">mail</span>
<input class="custom-input w-full bg-transparent border-t-0 border-x-0 border-b border-secondary-container py-3 pl-9 pr-2 font-body-md text-on-surface placeholder:text-secondary-fixed-dim transition-slow" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1">
<div class="flex justify-between items-center mb-2">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:opacity-70 transition-slow" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline px-1">lock</span>
<input class="custom-input w-full bg-transparent border-t-0 border-x-0 border-b border-secondary-container py-3 pl-9 pr-10 font-body-md text-on-surface transition-slow" id="password" name="password" required="" type="password"/>
<button class="absolute right-0 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-slow px-1" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- CTA Button -->
<div class="pt-4">
<button class="w-full bg-[#340D1A] text-white font-label-md text-label-md py-4 rounded-lg hover:opacity-90 active:scale-[0.98] transition-slow shadow-lg shadow-primary-container/10" type="submit">
                            Log In to Dashboard
                        </button>
</div>
</form>
<!-- Divider -->
<div class="relative my-8">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-secondary-container"></div>
</div>
<div class="relative flex justify-center text-label-sm uppercase tracking-widest">
<span class="bg-white px-4 text-outline-variant">OR</span>
</div>
</div>
<!-- Bio Auth / Social (Minimalist) -->
<button class="w-full border border-secondary-container font-label-md text-label-md py-4 rounded-lg flex items-center justify-center gap-3 hover:bg-surface-container transition-slow">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">fingerprint</span>
<span>Authenticate with AuraID</span>
</button>
</div>
<!-- Footer Link -->
<p class="mt-8 font-body-md text-secondary">
                Don't have an account? 
                <a class="text-primary font-semibold hover:underline decoration-primary-fixed-dim transition-slow" href="/signup">Sign Up Now</a>
</p>
</div>
</main>
<!-- Global Footer (Suppressed Nav but maintained brand identity) -->
<footer class="w-full py-8 px-margin-desktop flex flex-col md:flex-row justify-center items-center gap-4 relative z-10">
<p class="font-label-sm text-label-sm text-secondary-fixed-dim">© 2024 AuraMed Smart Systems. Reliable Sophistication in Health.</p>
<div class="flex gap-4">
<a class="font-label-sm text-label-sm text-secondary-fixed-dim hover:text-primary transition-slow" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-secondary-fixed-dim hover:text-primary transition-slow" href="#">Terms of Service</a>
</div>
</footer>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const passwordInput = document.getElementById('password');
            const visibilityBtn = passwordInput.nextElementSibling;
            
            visibilityBtn.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                visibilityBtn.querySelector('.material-symbols-outlined').textContent = type === 'password' ? 'visibility' : 'visibility_off';
            });

            // Smooth subtle movement on mouse move for the background effect
            const background = document.querySelector('.absolute.inset-0.z-0');
            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth) * 20;
                const y = (e.clientY / window.innerHeight) * 20;
                background.style.transform = `translate(${x}px, ${y}px)`;
            });
        });
    </script>
</body></html>
