<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login · Pill Pall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="./assets/css/admin-login.css">
</head>
<body>
<div class="page">
  <header class="brand">
    <h1 class="brand-name">Pill Pall</h1>
    <p class="brand-tagline">Smart Systems</p>
  </header>

  <main class="login-card">
    <form action="#" class="login-form" id="loginForm" method="POST" novalidate>
      <h2 class="form-title">Admin Login</h2>
      <p class="form-subtitle">Access the clinical management sanctuary.</p>

      <!-- Email -->
      <div class="field-group">
        <label class="field-label" for="email">Email Address</label>
        <div class="input-wrapper">
          <span class="field-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"></rect>
              <path d="m22 6-10 7L2 6"></path>
            </svg>
          </span>
          <input class="custom-input" id="email" name="email" placeholder="admin@pillpal.health" type="email" autocomplete="username">
        </div>
        <div class="errors" id="email_error"></div>
      </div>

      <!-- Password -->
      <div class="field-group">
        <label class="field-label" for="password">Password</label>
        <div class="input-wrapper password-wrapper">
          <span class="field-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </span>
          <input class="custom-input" id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password">
          <button class="toggle-password" type="button" aria-label="Toggle password visibility" id="togglePasswordBtn">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
        <div class="errors" id="pass_error"></div>
      </div>

      <div class="submit-row">
        <button type="submit" class="sign-in-btn" id="loginBtn">
          <span>Sign In</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"></path>
            <path d="m12 5 7 7-7 7"></path>
          </svg>
        </button>
      </div>
    </form>
  </main>

  <footer class="page-footer">
    <p>&copy; 2026 Pill Pal Smart Systems. Reliable Sophistication in Health.</p>
  </footer>
</div>

<script src="./assets/js/admin-login.js"></script>
</body>
</html>
