<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadence — Nav & Footer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav>
      <div class="wrap">
        <div class="logo">
          <span class="logo-mark">
            <svg viewBox="0 0 26 26" fill="none">
              <rect x="2" y="2" width="22" height="22" rx="6" fill="#33513f" />
              <rect x="7" y="7" width="5" height="5" rx="1.4" fill="#d98f2b" />
              <rect x="14" y="7" width="5" height="5" rx="1.4" fill="#dbe6dd" />
              <rect x="7" y="14" width="5" height="5" rx="1.4" fill="#dbe6dd" />
              <rect
                x="14"
                y="14"
                width="5"
                height="5"
                rx="1.4"
                fill="#dbe6dd"
              />
            </svg>
          </span>
          Cadence
        </div>
        <div class="nav-links" id="navLinks">
          <a href="#how">How it works</a>
          <a href="#features">Features</a>
          <a href="#caregivers">For families</a>
          <a href="#trust">Safety</a>
        </div>
        <button
          class="nav-toggle"
          id="navToggle"
          aria-label="Toggle menu"
          aria-expanded="false"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#1f3226"
            stroke-width="2"
            stroke-linecap="round"
          >
            <path d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <div class="nav-cta">
          <a href="#get" class="btn btn-primary">Get Cadence</a>
        </div>
      </div>
    </nav>

    <footer>
      <div class="wrap footer-grid">
        <div>
          <div class="logo" style="margin-bottom: 10px">
            <span class="logo-mark">
              <svg viewBox="0 0 26 26" fill="none">
                <rect
                  x="2"
                  y="2"
                  width="22"
                  height="22"
                  rx="6"
                  fill="#33513f"
                />
                <rect
                  x="7"
                  y="7"
                  width="5"
                  height="5"
                  rx="1.4"
                  fill="#d98f2b"
                />
                <rect
                  x="14"
                  y="7"
                  width="5"
                  height="5"
                  rx="1.4"
                  fill="#dbe6dd"
                />
                <rect
                  x="7"
                  y="14"
                  width="5"
                  height="5"
                  rx="1.4"
                  fill="#dbe6dd"
                />
                <rect
                  x="14"
                  y="14"
                  width="5"
                  height="5"
                  rx="1.4"
                  fill="#dbe6dd"
                />
              </svg>
            </span>
            Cadence
          </div>
          <p class="footer-copy">
            Cadence Home Inc. · A dispensing aid, not a medical device.
          </p>
        </div>
        <div class="footer-links">
          <a href="#how">How it works</a>
          <a href="#features">Features</a>
          <a href="#caregivers">For families</a>
          <a href="#trust">Safety</a>
        </div>
      </div>
    </footer>

    <script>
      const navToggle = document.getElementById("navToggle");
      const navLinks = document.getElementById("navLinks");
      navToggle.addEventListener("click", () => {
        const isOpen = navLinks.classList.toggle("open");
        navToggle.setAttribute("aria-expanded", isOpen);
      });
    </script>
  </body>
</html>
